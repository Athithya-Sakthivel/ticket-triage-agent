name: dense-image-ci

on:
  push:
    branches: [ main ]
    paths:
      - src/workloads/rag/dense/**
  pull_request:
    paths:
      - src/workloads/rag/dense/**

permissions:
  contents: read

concurrency:
  group: dense-image-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TRIVY_IMAGE: ghcr.io/athithya-sakthivel/trivy:0.69.3-safe@sha256:bcc376de8d77cfe086a917230e818dc9f8528e3c852f7b1aff648949b6258d1c
  TRIVY_CACHE_DIR: ${{ github.workspace }}/.trivy-cache

jobs:
  build-scan-push:
    name: Build, scan, publish dense image
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    environment: staging

    env:
      GIT_PAT: ${{ secrets.GIT_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare Trivy cache
        run: mkdir -p "${TRIVY_CACHE_DIR}"

      - name: Restore Trivy cache
        uses: actions/cache@v4
        with:
          path: ${{ env.TRIVY_CACHE_DIR }}
          key: trivy-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            trivy-${{ runner.os }}-

      - name: Compute image metadata
        id: image-meta
        run: |
          set -euo pipefail
          RAW_GHCR_USER="${GHCR_USER:-${{ github.actor }}}"
          GHCR_USER="$(printf '%s' "${RAW_GHCR_USER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME="${IMAGE_NAME:-dense}"
          IMAGE_TAG="${IMAGE_TAG:-$(TZ=Asia/Kolkata date +%Y-%m-%d-%H-%M)--$(git rev-parse --short HEAD)}"
          DENSE_IMAGE="ghcr.io/${GHCR_USER}/${IMAGE_NAME}:${IMAGE_TAG}"
          IMAGE_STAGING="ghcr.io/${GHCR_USER}/${IMAGE_NAME}:staging"
          echo "ghcr_user=${GHCR_USER}" >> "$GITHUB_OUTPUT"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "dense_image=${DENSE_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "image_staging=${IMAGE_STAGING}" >> "$GITHUB_OUTPUT"

      - name: Build image
        id: build-image
        uses: docker/build-push-action@v4
        with:
          context: src/workloads/rag/dense
          file: src/workloads/rag/dense/Dockerfile
          load: true
          push: false
          pull: true
          tags: |
            ${{ steps.image-meta.outputs.dense_image }}
            ${{ steps.image-meta.outputs.image_staging }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Scan built image with Trivy
        run: |
          set -euo pipefail
          scan_image="${{ steps.build-image.outputs.imageid }}"
          test -n "${scan_image}"
          ignore_args=()
          if [[ -f src/workloads/rag/dense/.trivyignore ]]; then
            ignore_args+=(--ignorefile /workspace/src/workloads/rag/dense/.trivyignore)
          elif [[ -f .trivyignore ]]; then
            ignore_args+=(--ignorefile /workspace/.trivyignore)
          fi
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${TRIVY_CACHE_DIR}:/root/.cache/trivy" \
            -v "$PWD:/workspace" \
            -w /workspace \
            "${TRIVY_IMAGE}" \
            image \
            --cache-dir /root/.cache/trivy \
            --scanners vuln \
            --severity CRITICAL \
            --exit-on-eol 1 \
            --exit-code 1 \
            "${ignore_args[@]}" \
            "${scan_image}"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ steps.image-meta.outputs.ghcr_user }}
          password: ${{ env.GIT_PAT }}

      - name: Push image tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          docker push "${{ steps.image-meta.outputs.dense_image }}"
          docker push "${{ steps.image-meta.outputs.image_staging }}"