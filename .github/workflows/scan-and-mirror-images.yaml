# .github/workflows/scan-and-mirror-images.yml
name: Scan and Mirror Images

on:
  workflow_dispatch:
    inputs:
      severity:
        description: 'Vulnerability severity threshold'
        required: false
        default: 'CRITICAL'
        type: choice
        options:
          - CRITICAL
          - HIGH
          - MEDIUM

env:
  GHCR_REGISTRY: ghcr.io

jobs:
  scan-and-mirror:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    
    strategy:
      fail-fast: false
      matrix:
        image:
          # SigNoz images
          - source: docker.io/signoz/signoz:v0.118.0
            name: signoz
          - source: docker.io/signoz/signoz-otel-collector:v0.144.2
            name: signoz-otel-collector
          - source: docker.io/clickhouse/clickhouse-server:25.5.6
            name: clickhouse-server
          - source: docker.io/altinity/clickhouse-operator:0.21.2
            name: clickhouse-operator
          - source: docker.io/altinity/metrics-exporter:0.21.2
            name: metrics-exporter
          - source: docker.io/signoz/zookeeper:3.7.1
            name: zookeeper
          - source: docker.io/alpine:3.18.2
            name: alpine
          - source: docker.io/busybox:1.35
            name: busybox
          # External Secrets Operator
          - source: ghcr.io/external-secrets/external-secrets:v2.5.0
            name: external-secrets
          # Reloader
          - source: ghcr.io/stakater/reloader:v1.4.16
            name: reloader

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse image info
        id: parse
        run: |
          SOURCE="${{ matrix.image.source }}"
          NAME="${{ matrix.image.name }}"
          TAG="${SOURCE##*:}"
          GHCR_IMAGE="ghcr.io/${{ github.repository_owner }}/${NAME}:${TAG}"
          
          echo "name=${NAME}" >> $GITHUB_OUTPUT
          echo "source=${SOURCE}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "ghcr_image=${GHCR_IMAGE}" >> $GITHUB_OUTPUT
          
          echo "---"
          echo "SOURCE: ${SOURCE}"
          echo "TARGET: ${GHCR_IMAGE}"

      - name: Pull source image
        run: |
          echo "Pulling: ${{ steps.parse.outputs.source }}"
          docker pull ${{ steps.parse.outputs.source }}
          echo "Pull complete: ${{ steps.parse.outputs.source }}"

      - name: Scan with Trivy
        id: scan
        continue-on-error: true
        run: |
          echo "Scanning: ${{ steps.parse.outputs.source }}"
          echo "Severity threshold: ${{ github.event.inputs.severity || 'CRITICAL' }}"
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            ghcr.io/athithya-sakthivel/trivy:0.69.3-safe \
            image \
            --scanners vuln \
            --severity ${{ github.event.inputs.severity || 'CRITICAL' }} \
            --format table \
            ${{ steps.parse.outputs.source }}
          echo "Scan complete: ${{ steps.parse.outputs.source }}"

      - name: Tag and push to GHCR
        id: mirror
        run: |
          docker tag ${{ steps.parse.outputs.source }} ${{ steps.parse.outputs.ghcr_image }}
          echo "Pushing: ${{ steps.parse.outputs.ghcr_image }}"
          docker push ${{ steps.parse.outputs.ghcr_image }}
          echo "Push complete: ${{ steps.parse.outputs.ghcr_image }}"

      - name: Print mirror reference
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ steps.parse.outputs.ghcr_image }})
          echo ""
          echo "MIRRORED: ${{ steps.parse.outputs.ghcr_image }}@${DIGEST##*@}"
          echo ""

  summary:
    needs: scan-and-mirror
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Print all mirrored images
        run: |
          OWNER="${{ github.repository_owner }}"
          echo ""
          echo "======================================================================"
          echo "  IMAGE MIRROR COMPLETE"
          echo "  Registry: ghcr.io/${OWNER}"
          echo "======================================================================"
          echo ""
          echo "SigNoz:"
          echo "  ghcr.io/${OWNER}/signoz:v0.118.0"
          echo "  ghcr.io/${OWNER}/signoz-otel-collector:v0.144.2"
          echo "  ghcr.io/${OWNER}/clickhouse-server:25.5.6"
          echo "  ghcr.io/${OWNER}/clickhouse-operator:0.21.2"
          echo "  ghcr.io/${OWNER}/metrics-exporter:0.21.2"
          echo "  ghcr.io/${OWNER}/zookeeper:3.7.1"
          echo "  ghcr.io/${OWNER}/alpine:3.18.2"
          echo "  ghcr.io/${OWNER}/busybox:1.35"
          echo ""
          echo "Infrastructure:"
          echo "  ghcr.io/${OWNER}/external-secrets:v2.5.0"
          echo "  ghcr.io/${OWNER}/reloader:v1.4.16"
          echo ""
          echo "Usage with digest:"
          echo "  docker pull ghcr.io/${OWNER}/signoz:v0.118.0@sha256:<digest>"
          echo "======================================================================"