name: dense-image-ci

on:
  push:
    branches: [ main ]
    paths:
      - src/workloads/rag/dense-minimal/**
      - .github/workflows/dense.yaml
  pull_request:
    branches: [ main ]
    paths:
      - src/workloads/rag/dense-minimal/**
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: dense-image-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-south-1
  AWS_ACCOUNT_ID: "681802563986"
  ROLE_NAME: gh-actions-dense-model
  ECR_REPOSITORY: dense-model
  IMAGE_NAME: dense

jobs:
  build-test-scan-push:
    name: Build, test, scan, publish dense image
    runs-on: ubuntu-24.04
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Construct AWS role ARN
        id: aws-role
        run: |
          echo "arn=arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.ROLE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Compute image metadata
        id: image-meta
        shell: bash
        run: |
          set -euo pipefail
          export TF_VAR_region="ap-south-1"
          IMAGE_TAG="${IMAGE_TAG:-$(TZ=Asia/Kolkata date +%Y-%m-%d-%H-%M)--$(git rev-parse --short HEAD)}"
          REGISTRY_HOST="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          PRIMARY_IMAGE="${REGISTRY_HOST}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"
          STAGING_IMAGE="${REGISTRY_HOST}/${{ env.ECR_REPOSITORY }}:staging"
          echo "registry_host=${REGISTRY_HOST}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "repo_name=${{ env.ECR_REPOSITORY }}" >> "$GITHUB_OUTPUT"
          echo "primary_image=${PRIMARY_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "staging_image=${STAGING_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build image (load into runner for tests)
        id: build-image
        uses: docker/build-push-action@v7.1.0
        with:
          context: src/workloads/rag/dense-minimal
          file: src/workloads/rag/dense-minimal/Dockerfile
          load: true
          push: false
          pull: true
          tags: |
            ${{ steps.image-meta.outputs.primary_image }}
            ${{ steps.image-meta.outputs.staging_image }}
          cache-from: type=gha,scope=dense-model
          cache-to: type=gha,mode=max,scope=dense-model

      - name: Run service tests
        shell: bash
        run: |
          set -euo pipefail
          export TF_VAR_region="ap-south-1"
          cd src/workloads/rag/dense-minimal
          export DENSE_MODEL_NAME="${DENSE_MODEL_NAME:-BAAI/bge-small-en-v1.5}"
          export DENSE_DIM="${DENSE_DIM:-384}"
          export DENSE_IMAGE_TAG="${IMAGE_TAG:-${{ steps.image-meta.outputs.image_tag }}}"
          export IMAGE_REPO="${IMAGE_REPO:-${{ steps.image-meta.outputs.repo_name }}}"
          chmod +x test_dense.sh
          TEST_MODE=cpu DENSE_MODEL_NAME="${DENSE_MODEL_NAME}" DENSE_DIM="${DENSE_DIM}" ./test_dense.sh

      - name: Scan built image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.build-image.outputs.imageid }}
          format: table
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Configure AWS credentials for ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          role-to-assume: ${{ steps.aws-role.outputs.arn }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/amazon-ecr-login@v2.1.5

      - name: Delete existing staging tag to allow overwrite
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          aws ecr batch-delete-image \
            --repository-name "${{ env.ECR_REPOSITORY }}" \
            --image-ids imageTag=staging \
            --region "${{ env.AWS_REGION }}" || true

      - name: Push image tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          export TF_VAR_region="ap-south-1"
          docker push "${{ steps.image-meta.outputs.primary_image }}"
          docker push "${{ steps.image-meta.outputs.staging_image }}"