# src/argo-apps/infra/cluster-secret-store.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-secret-store
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Athithya-Sakthivel/Autonomous-Incident-Responder
    targetRevision: main
    path: src/manifests/secrets-store
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true