apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-config
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Athithya-Sakthivel/ticket-triage-agent.git
    targetRevision: main
    path: src/manifests/infra/postgres
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true