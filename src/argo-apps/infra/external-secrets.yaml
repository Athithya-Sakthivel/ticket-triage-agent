apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Athithya-Sakthivel/Autonomous-Incident-Responder.git
    targetRevision: main
    path: src/manifests/external-secrets
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true