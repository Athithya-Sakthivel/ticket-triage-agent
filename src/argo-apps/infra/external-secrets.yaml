apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Athithya-Sakthivel/Autonomous-Incident-Responder.git
    targetRevision: main
    path: src/manifests/external-secrets
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd  # This is fine - ExternalSecrets will create secrets in their target namespaces
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false  # Namespaces should already exist
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m