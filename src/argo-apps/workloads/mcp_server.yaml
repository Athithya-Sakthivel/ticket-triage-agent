apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-server
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"  # after dense, retriever, signoz, qdrant
spec:
  project: default
  source:
    repoURL: https://github.com/Athithya-Sakthivel/ticket-triage-agent.git
    targetRevision: main
    path: src/manifests/workloads/mcp-server
  destination:
    server: https://kubernetes.default.svc
    namespace: inference
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true