apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: clickhouse
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels: &id001
      app: clickhouse
  template:
    metadata:
      labels: *id001
      annotations:
        checksum/prometheus-config: f24406ab4e9dbcf96035d39d545c3071992264ff4ee35f316d58c7cf5464e256
        checksum/users-config: e7361744d230480ce6395df468ee7cd8a919019141a5548dd5ec54178939eb9d
        checksum/init-sql: faa4bfead08a9493c32d3aeb02a1c101a683d17e68e02ac773ea3be168beed24
        checksum/image: a267eee4d3200da3a1e06ffa07ca17ea07e46f1b99640e10142c5ed00fea8435
    spec:
      securityContext:
        fsGroup: 101
      containers:
      - name: clickhouse
        image: docker.io/clickhouse/clickhouse-server:26.4.1@sha256:1688b8976802967d4754307b408d00ee57fe0396b40c6ffc195be228699e4fc2
        ports:
        - containerPort: 8123
          name: http
        - containerPort: 9000
          name: tcp
        - containerPort: 8001
          name: metrics
        volumeMounts:
        - name: data
          mountPath: /var/lib/clickhouse
        - name: clickhouse-logs
          mountPath: /var/log/clickhouse-server
        - name: prometheus-config
          mountPath: /etc/clickhouse-server/config.d
          readOnly: true
        - name: users-d
          mountPath: /etc/clickhouse-server/users.d
        - name: users-config
          mountPath: /etc/clickhouse-server/users.d/10-settings.xml
          subPath: 10-settings.xml
          readOnly: true
        - name: tmp
          mountPath: /tmp
        resources:
          requests:
            cpu: '1'
            memory: 0.5Gi
          limits:
            cpu: '3'
            memory: 2Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 101
          runAsGroup: 101
          capabilities:
            drop:
            - ALL
        livenessProbe:
          exec:
            command:
            - bash
            - -c
            - clickhouse-client --query 'SELECT 1' || exit 1
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
            - bash
            - -c
            - clickhouse-client --query 'SELECT 1' || exit 1
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
      volumes:
      - name: clickhouse-logs
        emptyDir: {}
      - name: prometheus-config
        configMap:
          name: clickhouse-prometheus-settings
      - name: users-d
        emptyDir: {}
      - name: users-config
        configMap:
          name: clickhouse-users-settings
          items:
          - key: 10-settings.xml
            path: 10-settings.xml
      - name: tmp
        emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: default-storage-class
      resources:
        requests:
          storage: 10Gi
