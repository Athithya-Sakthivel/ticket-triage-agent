apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dense-role
  namespace: inference
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dense-rb
  namespace: inference
subjects:
  - kind: ServiceAccount
    name: dense-sa
    namespace: inference
roleRef:
  kind: Role
  name: dense-role
  apiGroup: rbac.authorization.k8s.io