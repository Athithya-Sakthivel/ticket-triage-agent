apiVersion: apps/v1
kind: Deployment
metadata:
  name: dense
  namespace: inference
  labels: &labels
    app.kubernetes.io/name: dense
    app.kubernetes.io/component: embedding
    app.kubernetes.io/part-of: ticket-triage-agent
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dense
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels: *labels
    spec:
      serviceAccountName: dense-sa
      terminationGracePeriodSeconds: 30
      containers:
        - name: dense
          image: ghcr.io/athithya-sakthivel/dense:2026-05-23-13-13--0df319e@sha256:e65b567781bc3e26be296f5c197b40cffdbb4509f8a144690c5d6b4d7f226d3f
          imagePullPolicy: Always
          ports:
            - containerPort: 8200
              name: http
              protocol: TCP
          env:
            # ── Service identity ───────────────────────────────
            - name: OTEL_SERVICE_NAME
              value: dense-embedder
            - name: SERVICE_VERSION
              value: "0.1.0"
            - name: DEPLOYMENT_ENVIRONMENT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LOG_LEVEL
              value: "INFO"

            # ── OTel export → SigNoz OTel Collector ────────────
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://signoz-otel-collector.signoz.svc.cluster.local:4317
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"

            # ── Model configuration ────────────────────────────
            - name: DENSE_MODEL_NAME
              value: BAAI/bge-small-en-v1.5
            - name: DENSE_DIM
              value: "384"
            - name: DENSE_BATCH_SIZE
              value: "32"
            - name: DENSE_NORMALIZE
              value: "TRUE"
            - name: DENSE_CUDA
              value: "0"
            - name: PRELOAD_MODEL
              value: "1"
            - name: HF_HOME
              value: "/models_cache"

            # ── Server ─────────────────────────────────────────
            - name: DENSE_HOST
              value: "0.0.0.0"
            - name: DENSE_PORT
              value: "8200"

            # ── Threading (limit ONNX Runtime + BLAS) ──────────
            - name: OMP_NUM_THREADS
              value: "1"
            - name: OPENBLAS_NUM_THREADS
              value: "1"
            - name: MKL_NUM_THREADS
              value: "1"
            - name: ORT_NUM_THREADS
              value: "1"

          startupProbe:
            httpGet:
              path: /readyz
              port: 8200
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8200
            initialDelaySeconds: 0
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8200
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: models-cache
              mountPath: /models_cache

      securityContext:
        fsGroup: 1000
        runAsNonRoot: true

      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
        - name: models-cache
          emptyDir:
            sizeLimit: 1Gi