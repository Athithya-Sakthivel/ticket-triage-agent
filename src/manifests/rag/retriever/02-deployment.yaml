# 03-deployment.yaml – retriever-minimal, dense + Qdrant only
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retriever-minimal
  namespace: inference
  labels: &labels
    app.kubernetes.io/name: retriever-minimal
    app.kubernetes.io/component: retrieval
    app.kubernetes.io/part-of: ticket-triage-agent
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: retriever-minimal
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels: *labels
    spec:
      serviceAccountName: retriever-minimal-sa
      terminationGracePeriodSeconds: 30
      containers:
        - name: retriever-minimal
          image: ghcr.io/athithya-sakthivel/retriever:2026-05-23-12-43--6619b09@sha256:4cc4926f3e184233c4ee11ebace6079d7aac03edae7c35c7262f09aed609b67c
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
              name: http
              protocol: TCP
          env:
            # Service identity
            - name: OTEL_SERVICE_NAME
              value: retriever-minimal
            - name: SERVICE_VERSION
              value: "0.1.0"
            - name: DEPLOYMENT_ENVIRONMENT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

            # OTel export → SigNoz OTel Collector
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://signoz-otel-collector.signoz.svc.cluster.local:4317
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
            - name: OTEL_LOG_LEVEL
              value: INFO
            - name: OTEL_METRIC_EXPORT_INTERVAL_MS
              value: "60000"
            - name: OTEL_METRIC_EXPORT_TIMEOUT_MS
              value: "30000"

            # Upstream services – use cluster DNS names
            - name: DENSE_URL
              value: http://dense-svc.inference.svc.cluster.local:8200
            - name: QDRANT_URL
              value: http://qdrant.qdrant.svc.cluster.local:6333
            - name: COLLECTION_NAME
              value: kestral_policies
            - name: DENSE_DIM
              value: "384"
            - name: TOP_K
              value: "5"
            - name: HTTP_TIMEOUT
              value: "10.0"

          startupProbe:
            httpGet:
              path: /readyz
              port: 8001
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 0
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8001
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      securityContext:
        fsGroup: 1000
        runAsNonRoot: true

      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi