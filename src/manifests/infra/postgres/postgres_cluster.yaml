apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-cluster
  namespace: default
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-system-trixie
  backup:
    retentionPolicy: 30d
    barmanObjectStore:
      destinationPath: s3://s3-temp-bucket-mlsecops-681802563986/postgres_backups/cnpg-cluster-kind/
      serverName: mlsecops
      s3Credentials:
        accessKeyId:
          name: aws-creds
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: aws-creds
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
      data:
        compression: gzip
  bootstrap:
    initdb:
      database: agents_state
      owner: app
  storage:
    storageClass: default-storage-class
    size: 5Gi
  walStorage:
    storageClass: default-storage-class
    size: 2Gi
  postgresql:
    parameters:
      shared_buffers: "256MB"
      max_connections: "200"
      wal_compression: "on"
      effective_cache_size: "1GB"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
